<style>
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2230;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Segoe UI,sans-serif;padding:24px 28px;min-height:100vh}
a{color:var(--accent)}
/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.hdr-title{font-size:22px;font-weight:700;letter-spacing:-.3px}
.hdr-meta{color:var(--muted);font-size:13px;text-align:right;line-height:1.6}
/* Summary bar */
.sum-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:28px}

.sum-card .val{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.sum-card .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
/* Region grid */
.reg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(540px,1fr));gap:18px;margin-bottom:28px}
.reg-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.reg-hdr{display:flex;align-items:center;gap:10px;padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.reg-flag{font-size:24px;line-height:1}
.reg-name{font-size:17px;font-weight:700;flex:1}
.reg-badge{font-size:18px;font-weight:700;letter-spacing:-.3px}
.reg-kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.kpi-cell{background:var(--card2);padding:12px 14px}
.kpi-val{font-size:18px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kpi-trend{font-size:11px;margin-top:2px}
.trend-up{color:#3fb950}.trend-dn{color:#f85149}.trend-flat{color:var(--muted)}
.reg-charts{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:14px 16px;gap:12px}
.chart-wrap canvas{max-height:120px}
.chart-lbl{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.reg-note{padding:8px 18px 12px;font-size:12px;color:var(--muted)}
/* Details table */
details{margin:0 16px 14px}
summary{font-size:12px;color:var(--muted);cursor:pointer;padding:4px 0}
summary:hover{color:var(--text)}
table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
th,td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--border)}
th:first-child,td:first-child{text-align:left}
th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
tr:last-child td{border-bottom:none}
/* Combined chart */
.comb-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:28px}
.comb-title{font-size:15px;font-weight:600;margin-bottom:16px}
.comb-canvas{max-height:300px}
/* Footer */
.footer{color:var(--muted);font-size:12px;text-align:center;padding-top:16px;border-top:1px solid var(--border)}
</style>

const REGION_META = {
  '东南亚2': { flag: '🌏', color: '#06b6d4' },
  '日本':    { flag: '🇯🇵', color: '#f43f5e' },
  '东南亚':  { flag: '🌏', color: '#a78bfa' },
  '韩国':    { flag: '🇰🇷', color: '#3b82f6' },
  '俄罗斯':  { flag: '🇷🇺', color: '#fb923c' },
  '北美':    { flag: '🌎', color: '#34d399' },
};
function meta(r){ return REGION_META[r] || { flag:'🌐', color:'#58a6ff' }; }

function fmt(n){ return (Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtInt(n){ return Math.round(n).toLocaleString('en-US'); }
function pct(a,b){ if(!b) return null; return Math.round((a-b)/b*100); }
function trendHtml(p){
  if(p===null) return '';
  if(p>0) return '<span class="trend-up">▲ '+p+'%</span>';
  if(p<0) return '<span class="trend-dn">▼ '+Math.abs(p)+'%</span>';
  return '<span class="trend-flat">— 持平</span>';
}

function stats(reg){
  const s = reg.series;
  const totalUsers = s.reduce(function(a,b){return a+b.users;},0);
  const totalAmt   = s.reduce(function(a,b){return a+b.amount;},0);
  const avgAmt     = totalAmt / (s.filter(function(x){return x.users>0;}).length||1);
  const peak       = s.reduce(function(a,b){return b.amount>a.amount?b:a;},s[0]||{});
  const last7Amt   = s.slice(-7).reduce(function(a,b){return a+b.amount;},0);
  const prev7Amt   = s.slice(-14,-7).reduce(function(a,b){return a+b.amount;},0);
  const wow        = pct(last7Amt, prev7Amt);
  const last7U     = s.slice(-7).reduce(function(a,b){return a+b.users;},0);
  const prev7U     = s.slice(-14,-7).reduce(function(a,b){return a+b.users;},0);
  const wowU       = pct(last7U, prev7U);
  const dauDays    = s.filter(function(x){return x.dau>0;});
  const avgDau     = dauDays.length ? dauDays.reduce(function(a,b){return a+b.dau;},0)/dauDays.length : 0;
  const arpuDays   = s.filter(function(x){return x.arpu>0;});
  const avgArpu    = arpuDays.length ? arpuDays.reduce(function(a,b){return a+b.arpu;},0)/arpuDays.length : 0;
  const arppu_days = s.filter(function(x){return x.arppu>0;});
  const avgArppu   = arppu_days.length ? arppu_days.reduce(function(a,b){return a+b.arppu;},0)/arppu_days.length : 0;
  return { totalUsers:totalUsers, totalAmt:totalAmt, avgAmt:avgAmt, peak:peak, wow:wow, wowU:wowU, last7Amt:last7Amt, last7U:last7U, avgDau:avgDau, avgArpu:avgArpu, avgArppu:avgArppu };
}

          y:{ position:'left',  ticks:{color:'#8b949e',font:{size:10},callback:function(v){return '$'+fmtInt(v);}}, grid:{color:'#21262d'} },
          y2:{ position:'right', ticks:{color:'#a78bfa',font:{size:10},callback:function(v){return '$'+fmt(v);}}, grid:{display:false} }
        },
        plugins:{
          legend:{ display:true, labels:{color:'#e6edf3',font:{size:10},boxWidth:10,padding:8} },
          tooltip:{callbacks:{label:function(c){return ' '+c.dataset.label+': $'+fmt(c.parsed.y);}}}
        }
      }
    });
  });
}());
</script>
